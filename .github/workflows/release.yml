name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-linux:
    name: Build Linux (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            target: x86_64-unknown-linux-gnu
            musl_target: x86_64-unknown-linux-musl
            use-cross: false
          - arch: aarch64
            target: aarch64-unknown-linux-gnu
            musl_target: aarch64-unknown-linux-musl
            use-cross: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }},${{ matrix.musl_target }}

      - name: Install Rust (nightly, for eBPF)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Install cross
        if: matrix.use-cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build default binaries (server, agent, ctl, ui)
        run: |
          if [ "${{ matrix.use-cross }}" == "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Build k3rs-vpc (with eBPF)
        run: |
          if [ "${{ matrix.use-cross }}" == "true" ]; then
            cross build --release --target ${{ matrix.target }} -p k3rs-vpc --features ebpf
          else
            cargo build --release --target ${{ matrix.target }} -p k3rs-vpc --features ebpf
          fi

      - name: Build k3rs-init (musl static)
        run: |
          if [ "${{ matrix.use-cross }}" == "true" ]; then
            cross build --release --target ${{ matrix.musl_target }} -p k3rs-init
          else
            cargo build --release --target ${{ matrix.musl_target }} -p k3rs-init
          fi

      - name: Prepare artifacts
        run: |
          mkdir -p dist
          TARGET_DIR="target/${{ matrix.target }}/release"
          MUSL_DIR="target/${{ matrix.musl_target }}/release"

          for bin in k3rs-server k3rs-agent k3rsctl k3rs-ui k3rs-vpc k3rs-dev; do
            if [ -f "$TARGET_DIR/$bin" ]; then
              cp "$TARGET_DIR/$bin" "dist/$bin"
              strip "dist/$bin" 2>/dev/null || true
            fi
          done

          if [ -f "$MUSL_DIR/k3rs-init" ]; then
            cp "$MUSL_DIR/k3rs-init" "dist/k3rs-init"
            strip "dist/k3rs-init" 2>/dev/null || true
          fi

          cd dist && sha256sum * > checksums.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: k3rs-linux-${{ matrix.arch }}
          path: dist/

  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            target: x86_64-apple-darwin
          - arch: aarch64
            target: aarch64-apple-darwin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build binaries
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build k3rs-vmm
        run: cargo build --release --target ${{ matrix.target }} -p k3rs-vmm

      - name: Prepare artifacts
        run: |
          mkdir -p dist
          TARGET_DIR="target/${{ matrix.target }}/release"

          for bin in k3rs-server k3rs-agent k3rsctl k3rs-ui k3rs-vmm k3rs-dev; do
            if [ -f "$TARGET_DIR/$bin" ]; then
              cp "$TARGET_DIR/$bin" "dist/$bin"
              strip "dist/$bin" 2>/dev/null || true
            fi
          done

          cd dist && shasum -a 256 * > checksums.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: k3rs-macos-${{ matrix.arch }}
          path: dist/

  release:
    name: Create Release
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          for dir in artifacts/*/; do
            platform=$(basename "$dir")
            for file in "$dir"*; do
              [ -f "$file" ] || continue
              name=$(basename "$file")
              # Skip per-platform checksums, we'll generate a combined one
              [ "$name" = "checksums.sha256" ] && continue
              mv "$file" "release-assets/${platform}-${name}"
            done
          done

          cd release-assets && sha256sum * > checksums.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
